<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn btn-c">C</button>
      <button class="btn btn-back">&larr;</button>
      <button class="btn btn-operator">&divide;</button>
      
      <!-- Row 2 -->
      <button class="btn">7</button>
      <button class="btn">8</button>
      <button class="btn">9</button>
      <button class="btn btn-operator">&times;</button>
      
      <!-- Row 3 -->
      <button class="btn">4</button>
      <button class="btn">5</button>
      <button class="btn">6</button>
      <button class="btn btn-operator">-</button>
      
      <!-- Row 4 -->
      <button class="btn">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <button class="btn btn-operator">+</button>
      
      <!-- Row 5 -->
      <button class="btn btn-zero">0</button>
      <button class="btn btn-operator">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
